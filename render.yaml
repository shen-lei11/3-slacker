services:
  - type: web
    name: trio-hub
    runtime: python
    plan: starter
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --timeout 120 --access-logfile - --error-logfile -
    healthCheckPath: /healthz
    autoDeploy: true
    disk:
      name: trio-hub-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATA_DIR
        value: /var/data
      - key: PYTHON_VERSION
        value: 3.13.0

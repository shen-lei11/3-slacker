services:
  - type: web
    name: trio-hub
    runtime: python
    plan: starter
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: mkdir -p /var/data && gunicorn app:app --workers 1 --timeout 120 --access-logfile - --error-logfile -
    healthCheckPath: /healthz
    autoDeploy: true
    disk:
      name: trio-hub-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:////var/data/trio_hub.db
      - key: PYTHON_VERSION
        value: 3.13.0
